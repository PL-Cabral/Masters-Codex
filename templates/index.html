<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Master's Codex - VTT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1, h2, h3, h4 { color: #ff4757; margin-top: 0; }
        h2 { border-bottom: 2px solid #3a3a3a; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; font-size: 14px;}
        input, select, button { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #3a3a3a; color: #fff; box-sizing: border-box; }
        button { background-color: #ff4757; font-weight: bold; cursor: pointer; border: none; margin-top: 5px; }
        button:hover { background-color: #e84118; }
        .box { background: #222; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .hp-bar { background: #4cd137; height: 10px; border-radius: 5px; transition: width 0.3s; }
        #combat-log-box { background: #000; color: #00ff00; font-family: monospace; padding: 15px; height: 200px; overflow-y: auto; border-radius: 5px; border: 1px solid #333;}
        .entity-item { background: #2c2c2c; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>MASTER'S CODEX</h1>
    
    <div id="login-screen">
        <h2>Acesso ao Sistema</h2>
        
        <div class="form-group">
            <label>Sua Função:</label>
            <select id="role-select" onchange="toggleLoginUI()">
                <option value="master">Mestre (GM)</option>
                <option value="player">Jogador</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Seu Nome:</label>
            <input type="text" id="username" placeholder="Nome de usuário...">
        </div>

        <div id="gm-options" class="box" style="background: #30171a;">
            <div class="form-group">
                <label>Ação do Mestre:</label>
                <select id="gm-action" onchange="toggleLoginUI()">
                    <option value="create">Criar Nova Mesa</option>
                    <option value="load">Carregar Mesa Existente</option>
                </select>
            </div>
        </div>

        <div id="table-inputs" class="box">
            <div class="form-group" id="input-table-id" style="display:none;">
                <label>ID da Mesa (Código):</label>
                <input type="text" id="table-id" placeholder="Ex: 1234-abcd">
            </div>
            
            <div class="form-group" id="input-table-name" style="display:none;">
                <label>Nome da Nova Mesa:</label>
                <input type="text" id="table-name" placeholder="Ex: Campanha Épica">
            </div>

            <div class="form-group" id="input-password" style="display:none;">
                <label>Senha do Mestre:</label>
                <input type="password" id="password" placeholder="Senha de segurança">
            </div>
        </div>
        
        <button onclick="performLogin()">Entrar no Codex</button>
    </div>

    <div id="char-creation-screen" style="display:none;">
        <h2>Criação de Personagem</h2>
        <p>Parece que é a sua primeira vez nesta sessão. Escolha sua classe:</p>
        <div class="form-group">
            <select id="char-class">
                <option value="Guerreiro">Guerreiro (Foco em Força)</option>
                <option value="Mago">Mago (Foco em Inteligência)</option>
                <option value="Assassino">Assassino (Foco em Destreza)</option>
            </select>
        </div>
        <button onclick="finalizeCharCreation()" style="background-color: #2ed573; color: #000;">Salvar Personagem e Entrar</button>
    </div>

    <div id="vtt-screen" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; padding-bottom: 10px; margin-bottom: 20px;">
            <h2 style="margin: 0;">Sessão: <span id="display-table-name" style="color:#2ed573;"></span></h2>
            <div style="background: #2ed573; color: #000; padding: 2px 6px; border-radius: 3px; font-weight: bold;">
                Código: <span id="display-table-id"></span>
            </div>
        </div>

        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                
                <div id="gm-tools" class="box" style="display:none; background: #30171a;">
                    <h4 style="color: #ff9f43; margin-top: 0;">Invocar Monstro / NPC</h4>
                    <input type="text" id="mob-name" placeholder="Nome do Monstro (Ex: Goblin Raivoso)" style="margin-bottom: 10px;">
                    <input type="number" id="mob-hp" placeholder="HP Máximo" style="margin-bottom: 10px;">
                    <button onclick="addMob()">Invocar na Mesa</button>
                </div>

                <div class="box" style="background: #192a56;">
                    <h3 style="margin-top: 0;">Central de Ações</h3>
                    <div class="form-group">
                        <label>Quem está agindo?</label>
                        <select id="action-actor"><option value="">Selecione...</option></select>
                    </div>
                    <div class="form-group flex-row">
                        <select id="action-type" style="flex: 2;">
                            <option value="Ataque Físico">Ataque Físico</option>
                            <option value="Ataque Mágico">Ataque Mágico</option>
                            <option value="Cura">Cura</option>
                            <option value="Teste de Habilidade">Teste de Habilidade</option>
                        </select>
                        <select id="action-dice" style="flex: 1;">
                            <option value="20">D20</option>
                            <option value="12">D12</option>
                            <option value="10">D10</option>
                            <option value="6">D6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Alvo da Ação:</label>
                        <select id="action-target"><option value="">Nenhum / Área</option></select>
                    </div>
                    <button onclick="performAction()" style="background-color: #3742fa;">Rolar Dados e Executar!</button>
                </div>
            </div>

            <div style="flex: 1.5; min-width: 350px;">
                <div class="box">
                    <h3 style="margin-top: 0;">Status do Tabuleiro</h3>
                    
                    <h4 style="color:#2ed573; border-bottom: 1px solid #444; padding-bottom: 5px;">Jogadores</h4>
                    <ul id="players-list" style="list-style: none; padding: 0; margin: 0 0 20px 0;"></ul>
                    
                    <h4 style="color:#ff4757; border-bottom: 1px solid #444; padding-bottom: 5px;">Ameaças</h4>
                    <ul id="monsters-list" style="list-style: none; padding: 0; margin: 0;"></ul>
                </div>

                <div class="box">
                    <h3 style="margin-top: 0;">Log de Eventos</h3>
                    <div id="combat-log-box"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let currentTableId = null;
    let pollingInterval = null;
    let lastTableHash = ""; // Previne o "Flickering"

    // --- CONTROLE DE UI INICIAL ---
    function toggleLoginUI() {
        const role = document.getElementById('role-select').value;
        const gmAction = document.getElementById('gm-action').value;
        
        const gmOpts = document.getElementById('gm-options');
        const boxId = document.getElementById('input-table-id');
        const boxName = document.getElementById('input-table-name');
        const boxPass = document.getElementById('input-password');

        if (role === 'player') {
            gmOpts.style.display = 'none';
            boxId.style.display = 'block';
            boxName.style.display = 'none';
            boxPass.style.display = 'none'; // Jogador NÃO usa senha
        } else {
            gmOpts.style.display = 'block';
            boxPass.style.display = 'block'; // GM SEMPRE usa senha
            if (gmAction === 'create') {
                boxId.style.display = 'none';
                boxName.style.display = 'block';
            } else {
                boxId.style.display = 'block';
                boxName.style.display = 'none';
            }
        }
    }

    window.onload = toggleLoginUI;

    // --- FLUXO DE LOGIN ---
    async function performLogin() {
        const role = document.getElementById('role-select').value;
        const username = document.getElementById('username').value;
        const tid = document.getElementById('table-id').value;
        const tname = document.getElementById('table-name').value;
        const pwd = document.getElementById('password').value;
        const gmAction = document.getElementById('gm-action').value;

        if(!username) return alert("Por favor, digite seu nome!");

        if (role === 'master') {
            if (gmAction === 'create') {
                if(!tname || !pwd) return alert("Preencha o Nome e a Senha da nova mesa.");
                const res = await fetch('/api/table/create', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({table_name: tname, password: pwd})});
                const data = await res.json();
                if(data.status === 'success') {
                    alert(`Sua mesa foi criada! O código dela é: ${data.table_id}\nGuarde este código!`);
                    
                    // Fazer o GM logar automaticamente na mesa criada
                    const loginRes = await fetch('/api/login/master', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, table_id: data.table_id, password: pwd})});
                    const loginData = await loginRes.json();
                    if(loginData.status === 'success') {
                        currentUser = loginData;
                        currentTableId = data.table_id;
                        document.getElementById('gm-tools').style.display = 'block';
                        startVTT();
                    }
                }
            } else {
                if(!tid || !pwd) return alert("Preencha o ID e a Senha para entrar.");
                const res = await fetch('/api/login/master', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, table_id: tid, password: pwd})});
                const data = await res.json();
                if(data.status === 'success') {
                    currentUser = data;
                    currentTableId = tid;
                    document.getElementById('gm-tools').style.display = 'block';
                    startVTT();
                } else { alert(data.message); }
            }
        } else {
            // Lógica do JOGADOR
            if(!tid) return alert("Jogadores precisam do Código da Mesa para entrar.");
            const res = await fetch('/api/login/player', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, table_id: tid})});
            const data = await res.json();
            
            if(data.status === 'success') {
                currentUser = {username, role:'player', char_id: data.char_id};
                currentTableId = tid;
                startVTT();
            } else if (data.status === 'needs_creation') {
                currentTableId = tid;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('char-creation-screen').style.display = 'block';
            } else { alert(data.message); }
        }
    }

    async function finalizeCharCreation() {
        const payload = {
            username: document.getElementById('username').value,
            table_id: currentTableId,
            char_class: document.getElementById('char-class').value
        };

        const res = await fetch('/api/player/create_character', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        const data = await res.json();
        
        if(data.status === 'success') {
            currentUser = {username: payload.username, role: 'player', char_id: data.char_id};
            startVTT();
        }
    }

    async function addMob() {
        const payload = {
            table_id: currentTableId,
            name: document.getElementById('mob-name').value,
            hp: document.getElementById('mob-hp').value || 10
        };
        if(!payload.name) return alert("De um nome ao monstro!");
        await fetch('/api/table/add_entity', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        
        document.getElementById('mob-name').value = '';
        lastTableHash = ""; // Força atualização da tela
        fetchTableDetails();
    }

    // --- MOTOR DE SINCRONIZAÇÃO (VTT) ---
    function startVTT() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('char-creation-screen').style.display = 'none';
        document.getElementById('vtt-screen').style.display = 'block';
        fetchTableDetails();
        if(pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(fetchTableDetails, 3000);
    }

    async function fetchTableDetails() {
        if(!currentTableId) return;
        const res = await fetch(`/api/table/${currentTableId}`);
        const data = await res.json();
        
        if(data.status === 'error') return;

        // Validação Inteligente: Só recria a interface se os dados mudaram
        const hash = JSON.stringify(data);
        if (hash === lastTableHash) return;
        lastTableHash = hash;

        document.getElementById('display-table-name').innerText = data.name;
        document.getElementById('display-table-id').innerText = data.id;

        // Salva seletores
        const aSelect = document.getElementById('action-actor');
        const tSelect = document.getElementById('action-target');
        const curActor = aSelect.value;
        const curTarget = tSelect.value;

        aSelect.innerHTML = '<option value="">Selecione...</option>';
        tSelect.innerHTML = '<option value="">Nenhum / Área</option>';
        
        const pList = document.getElementById('players-list');
        const mList = document.getElementById('monsters-list');
        pList.innerHTML = ''; mList.innerHTML = '';

        const renderEnt = (ent, list) => {
            if(!ent || !ent.name) return;
            const li = document.createElement('li');
            li.className = 'entity-item';
            
            const color = ent.hp <= 0 ? '#444' : (ent.class !== 'NPC' && ent.class !== 'Monstro' ? '#2ed573' : '#ff4757');
            li.style.borderLeftColor = color;
            
            const percent = Math.max(0, Math.min(100, (ent.hp / ent.max_hp) * 100));

            li.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <strong style="${ent.hp <= 0 ? 'text-decoration: line-through; color: #888;' : ''}">${ent.name} <span style="font-size: 11px; color: #aaa; font-weight: normal;">[${ent.class}]</span></strong>
                    <span style="font-family: monospace;">${ent.hp}/${ent.max_hp}</span>
                </div>
                <div style="background:#111; width:100%; height:8px; border-radius:4px;">
                    <div class="hp-bar" style="width:${percent}%; background:${color};">
