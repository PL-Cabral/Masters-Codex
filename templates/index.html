<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Master's Codex - VTT Web</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #222; padding: 20px; border-radius: 8px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; background: #333; color: white; border: 1px solid #555; }
        button { background: #ff4757; font-weight: bold; cursor: pointer; }
        #vtt-screen { display: none; }
        .list-item { background: #333; padding: 10px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="container">
    <h1>MASTER'S CODEX</h1>
    <div id="login-screen">
        <select id="role-select"><option value="master">Mestre</option><option value="player">Jogador</option></select>
        <input type="text" id="username" placeholder="Nome">
        <input type="text" id="login-table-id" placeholder="Código da Mesa">
        <button onclick="performLogin()">Entrar</button>
    </div>
    
    <div id="char-creation-screen" style="display:none;">
        <h2>Criação de Personagem</h2>
        <select id="char-class"><option value="Guerreiro">Guerreiro</option><option value="Mago">Mago</option></select>
        <button onclick="finalizeCharCreation()">Salvar e Entrar</button>
    </div>

    <div id="vtt-screen">
        <h2 id="table-name-display">Carregando...</h2>
        <div id="players-list"></div>
        <div id="monsters-list"></div>
    </div>
</div>

<script>
    let currentUser = null, currentTableId = null;

    async function performLogin() {
        const username = document.getElementById('username').value;
        const tableId = document.getElementById('login-table-id').value;
        const role = document.getElementById('role-select').value;
        
        if(role === 'player') {
            const res = await fetch('/api/login/player', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, table_id: tableId})});
            const data = await res.json();
            if(data.status === 'success') {
                currentTableId = tableId; 
                startVTT();
            } else {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('char-creation-screen').style.display = 'block';
                currentTableId = tableId; // Salva o ID da mesa para a criação
            }
        }
    }

    async function finalizeCharCreation() {
        const res = await fetch('/api/player/create_character', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                table_id: currentTableId,
                char_class: document.getElementById('char-class').value,
                attributes: {con: 14} 
            })
        });
        const data = await res.json();
        if(data.status === 'success') startVTT();
    }

    function startVTT() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('char-creation-screen').style.display = 'none';
        document.getElementById('vtt-screen').style.display = 'block';
        setInterval(fetchTableDetails, 3000);
    }

    async function fetchTableDetails() {
        if(!currentTableId) return;
        const res = await fetch(`/api/table/${currentTableId}`);
        const data = await res.json();
        document.getElementById('table-name-display').innerText = data.name;
        // Renderize as listas aqui usando data.players e data.monsters
    }
</script>
</body>
</html>
